<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CRT Notes">
<meta name="theme-color" content="#000000">
<title>CRT NOTES</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
:root{--green:#39ff14;--green-dim:#1aad00;--green-glow:rgba(57,255,20,0.18);--green-deep:rgba(57,255,20,0.06);--bg:#040a00;--border:rgba(57,255,20,0.35);--btn-bg:rgba(57,255,20,0.11);--btn-hover:rgba(57,255,20,0.24);--text-muted:rgba(57,255,20,0.50);}
html{height:100%;height:-webkit-fill-available;}
body{height:100%;height:-webkit-fill-available;width:100%;background:#000;color:var(--green);font-family:'Share Tech Mono','Courier New',monospace;font-size:13px;overflow:hidden;overscroll-behavior:none;-webkit-overflow-scrolling:touch;user-select:none;-webkit-user-select:none;}
.crt-shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0c0c0c 0%,#000 100%);padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
.crt-bezel{position:relative;width:min(940px,97vw);height:min(680px,calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 8px));background:linear-gradient(145deg,#2e2e2e 0%,#141414 45%,#1c1c1c 100%);border-radius:clamp(8px,2vw,20px);padding:clamp(10px,2vw,26px);box-shadow:0 0 0 3px #2a2a2a,0 0 0 6px #1a1a1a,0 10px 70px rgba(0,0,0,.95),inset 0 2px 4px rgba(255,255,255,.06);}
.crt-bezel::before{content:'';position:absolute;top:6px;left:8%;right:8%;height:12px;background:linear-gradient(to bottom,rgba(255,255,255,.06),transparent);border-radius:50%;pointer-events:none;}
.crt-screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:clamp(4px,1vw,10px);overflow:hidden;box-shadow:inset 0 0 80px rgba(0,0,0,.7),inset 0 0 30px rgba(57,255,20,.04),0 0 40px rgba(57,255,20,.07);}
.crt-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 52%,rgba(0,0,0,.65) 100%);pointer-events:none;z-index:50;border-radius:inherit;}
.crt-screen::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,.14) 2px,rgba(0,0,0,.14) 4px);pointer-events:none;z-index:51;border-radius:inherit;}
@keyframes flicker{0%,100%{opacity:1}1%{opacity:.93}2%{opacity:1}22%{opacity:.88}23%{opacity:1}58%{opacity:.95}59%{opacity:1}75%{opacity:.86}76%{opacity:.98}77%{opacity:1}}
@keyframes phosphor{0%,100%{filter:brightness(1) saturate(1)}50%{filter:brightness(1.05) saturate(1.12)}}
@keyframes scanroll{from{transform:translateY(-100%)}to{transform:translateY(720px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.crt-content{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column;animation:flicker 9s infinite,phosphor 5s ease-in-out infinite;}
.scan-bar{position:absolute;left:0;right:0;height:60px;background:linear-gradient(to bottom,transparent,rgba(57,255,20,.025) 40%,rgba(57,255,20,.015) 60%,transparent);pointer-events:none;z-index:52;animation:scanroll 7s linear infinite;}
.toolbar{display:flex;align-items:center;padding:8px 12px;border-bottom:1px dashed var(--border);gap:6px;flex-shrink:0;flex-wrap:wrap;min-height:44px;}
.toolbar-left{display:flex;gap:5px;flex:1;flex-wrap:wrap;align-items:center;}
.toolbar-right{display:flex;gap:5px;}
.btn{background:var(--btn-bg);border:1px solid var(--border);color:var(--green);font-family:inherit;font-size:clamp(9px,1.5vw,11px);letter-spacing:.08em;text-transform:uppercase;padding:0 10px;cursor:pointer;border-radius:2px;transition:background .12s,box-shadow .12s;white-space:nowrap;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn:hover,.btn:active{background:var(--btn-hover);box-shadow:0 0 9px var(--green-glow);}
.btn.active{background:rgba(57,255,20,.28);box-shadow:0 0 12px var(--green-glow);}
.btn-danger{color:rgba(255,70,70,.85);border-color:rgba(255,60,60,.28);background:rgba(255,0,0,.05);}
.btn-danger:hover,.btn-danger:active{background:rgba(255,0,0,.15);color:#ff5555;}
.btn.sound-on{color:var(--green);}
.btn.sound-off{color:var(--text-muted);}
.search-wrap{position:relative;display:flex;align-items:center;}
.search-prefix{font-size:11px;color:var(--text-muted);pointer-events:none;padding-right:4px;letter-spacing:.06em;}
.search-input{background:rgba(57,255,20,.06);border:1px solid rgba(57,255,20,.28);outline:none;color:var(--green);font-family:inherit;font-size:11px;letter-spacing:.06em;padding:0 24px 0 6px;width:120px;caret-color:var(--green);border-radius:2px;transition:border-color .15s,width .2s;min-height:44px;user-select:text;-webkit-user-select:text;}
.search-input:focus{border-color:var(--green);box-shadow:0 0 8px var(--green-glow);width:150px;}
.search-input::placeholder{color:rgba(57,255,20,.25);}
.search-clear{position:absolute;right:4px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:10px;font-family:inherit;display:none;padding:4px;min-height:44px;touch-action:manipulation;}
.search-clear.visible{display:flex;align-items:center;}
.meta-bar{padding:4px 12px;font-size:10px;color:var(--text-muted);letter-spacing:.06em;border-bottom:1px dashed rgba(57,255,20,.15);flex-shrink:0;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:clamp(120px,22vw,190px);border-right:1px dashed var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;transition:width .15s;-webkit-overflow-scrolling:touch;}
.sidebar.collapsed{width:0;overflow:hidden;border:none;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--green-dim);border-radius:2px;}
.sidebar-label{font-size:9px;letter-spacing:.1em;color:var(--text-muted);padding:6px 10px 2px;text-transform:uppercase;flex-shrink:0;}
.note-item{padding:8px 10px;cursor:pointer;border-left:2px solid transparent;color:var(--text-muted);font-size:11px;overflow:hidden;transition:all .1s;flex-shrink:0;min-height:54px;display:flex;flex-direction:column;justify-content:center;touch-action:manipulation;}
.note-item:active{background:rgba(57,255,20,.12);}
.note-item.active{color:var(--green);border-left-color:var(--green);background:rgba(57,255,20,.07);}
.note-item-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px;}
.note-icon{font-size:9px;opacity:.6;flex-shrink:0;}
.note-item-date{font-size:9px;color:rgba(57,255,20,.35);margin-top:2px;letter-spacing:.04em;}
.note-item-preview{font-size:9px;color:rgba(57,255,20,.3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-item mark{background:rgba(57,255,20,.3);color:var(--green);}
.no-results{padding:10px 12px;font-size:10px;color:rgba(57,255,20,.3);letter-spacing:.06em;text-align:center;margin-top:8px;}
.editor-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.note-title-bar{padding:8px 12px 6px;border-bottom:1px dashed rgba(57,255,20,.2);flex-shrink:0;}
.note-title-input{background:transparent;border:none;outline:none;color:var(--green);font-family:inherit;font-size:clamp(14px,3vw,17px);font-weight:bold;letter-spacing:.05em;text-transform:uppercase;width:100%;caret-color:var(--green);text-shadow:0 0 8px rgba(57,255,20,.5),0 0 16px rgba(57,255,20,.25);user-select:text;-webkit-user-select:text;min-height:44px;}
.note-title-input::placeholder{color:rgba(57,255,20,.22);}
.timestamp-bar{padding:3px 12px 5px;font-size:9px;color:rgba(57,255,20,.38);letter-spacing:.07em;border-bottom:1px dashed rgba(57,255,20,.1);flex-shrink:0;display:none;gap:12px;flex-wrap:wrap;}
.timestamp-bar.visible{display:flex;}
.editor{flex:1;padding:10px 12px;overflow-y:auto;position:relative;-webkit-overflow-scrolling:touch;}
.editor::-webkit-scrollbar{width:3px;}
.editor::-webkit-scrollbar-thumb{background:var(--green-dim);border-radius:2px;}
.text-editor{background:transparent;border:none;outline:none;color:var(--green);font-family:inherit;font-size:14px;line-height:1.75;width:100%;height:100%;min-height:200px;resize:none;caret-color:var(--green);text-shadow:0 0 6px rgba(57,255,20,.38);user-select:text;-webkit-user-select:text;}
.text-editor::placeholder{color:rgba(57,255,20,.18);}
.task-list{list-style:none;padding:0;}
.task-input-row{display:flex;align-items:center;gap:10px;margin-bottom:2px;padding:4px 0;animation:fadeIn .15s ease;min-height:50px;}
.task-cb{appearance:none;-webkit-appearance:none;width:20px;height:20px;min-width:20px;border:1px solid var(--green);background:transparent;cursor:pointer;flex-shrink:0;position:relative;border-radius:2px;touch-action:manipulation;}
.task-cb:checked{background:rgba(57,255,20,.18);}
.task-cb:checked::after{content:"X";position:absolute;top:-1px;left:3px;font-size:13px;color:var(--green);line-height:1;}
.task-text{background:transparent;border:none;outline:none;color:var(--green);font-family:inherit;font-size:14px;flex:1;caret-color:var(--green);text-shadow:0 0 5px rgba(57,255,20,.3);user-select:text;-webkit-user-select:text;min-height:50px;display:flex;align-items:center;padding:0;}
.task-text.done{color:var(--text-muted);text-decoration:line-through;}
.task-text::placeholder{color:rgba(57,255,20,.18);}
.task-del{background:none;border:none;color:rgba(57,255,20,.28);cursor:pointer;font-size:14px;padding:4px 8px;font-family:inherit;min-height:50px;min-width:44px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.task-del:active{color:rgba(255,70,70,.8);}
.add-task-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:.08em;padding:10px 0;margin-top:4px;display:flex;align-items:center;gap:6px;min-height:50px;touch-action:manipulation;}
.add-task-btn:active{color:var(--green);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);text-align:center;gap:12px;letter-spacing:.05em;padding:20px;}
.empty-state .big{font-size:40px;line-height:1;text-shadow:0 0 12px var(--green);animation:blink 1.2s step-end infinite;}
.empty-state p{font-size:12px;max-width:270px;line-height:1.7;}
.glow-text{text-shadow:0 0 8px var(--green),0 0 18px rgba(57,255,20,.4);color:var(--green);}
.status-bar{padding:4px 12px;border-top:1px dashed rgba(57,255,20,.2);font-size:10px;color:var(--text-muted);letter-spacing:.06em;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;padding-bottom:max(6px,env(safe-area-inset-bottom));}
.cursor{display:inline-block;animation:blink 1s step-end infinite;}
.modal-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--bg);border:1px solid var(--border);padding:24px 28px;max-width:300px;width:90%;text-align:center;box-shadow:0 0 35px var(--green-glow);font-size:12px;letter-spacing:.05em;animation:fadeIn .15s ease;border-radius:4px;}
.modal-box h3{font-size:14px;margin-bottom:12px;text-transform:uppercase;text-shadow:0 0 8px var(--green);}
.modal-box p{color:var(--text-muted);margin-bottom:20px;line-height:1.6;}
.modal-btns{display:flex;gap:12px;justify-content:center;}
@media(max-width:480px){.search-prefix{display:none;}.search-input{width:80px;}.search-input:focus{width:110px;}.note-title-input{font-size:14px;}.toolbar{padding:6px 8px;gap:4px;}.right-status{display:none;}}
</style>
</head>
<body>
<div class="crt-shell">
  <div class="crt-bezel">
    <div class="crt-screen">
      <div class="scan-bar"></div>
      <div class="crt-content" id="app">
        <div class="toolbar">
          <div class="toolbar-left">
            <button class="btn" onclick="newNote('text')">+ NOTE</button>
            <button class="btn" onclick="newNote('task')">+ TASKS</button>
            <button class="btn active" id="btnView" onclick="toggleSidebar()">LIST</button>
            <div class="search-wrap">
              <span class="search-prefix">SEARCH:</span>
              <input class="search-input" id="searchInput" type="text" placeholder="QUERY..." autocomplete="off" oninput="handleSearch(this.value)">
              <button class="search-clear" id="searchClear" onclick="clearSearch()">X</button>
            </div>
          </div>
          <div class="toolbar-right">
            <button class="btn sound-on" id="btnSound" onclick="toggleSound()">SFX</button>
            <button class="btn btn-danger" onclick="confirmDelete()">DEL</button>
          </div>
        </div>
        <div class="meta-bar">
          <span>DATE: <span id="dateDisplay"></span></span>
          <span>NOTES: <span id="noteCount">0</span></span>
          <span id="modeLabel">--</span>
          <span id="searchStatus" style="display:none;color:var(--green)"></span>
        </div>
        <div class="main">
          <div class="sidebar" id="sidebar">
            <div class="sidebar-label">-- NOTES --</div>
            <div id="noteList"></div>
          </div>
          <div class="editor-wrap">
            <div class="note-title-bar">
              <input class="note-title-input" id="noteTitle" type="text" placeholder="TITLE..." autocomplete="off" oninput="saveTitle()">
            </div>
            <div class="timestamp-bar" id="timestampBar">
              <span>CREATED: <span id="tsCreated">--</span></span>
              <span>MODIFIED: <span id="tsModified">--</span></span>
            </div>
            <div class="editor" id="editorArea">
              <div class="empty-state">
                <div class="big">|</div>
                <p class="glow-text">NO NOTE SELECTED</p>
                <p>TAP + NOTE OR + TASKS TO BEGIN<span class="cursor">_</span></p>
              </div>
            </div>
          </div>
        </div>
        <div class="status-bar">
          <span id="statusLeft">READY<span class="cursor">_</span></span>
          <span class="right-status" id="statusRight">CRT NOTES v1.1</span>
        </div>
      </div>
      <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
          <h3>WARNING</h3>
          <p>THIS CANNOT BE UNDONE.<br>DELETE THIS NOTE?</p>
          <div class="modal-btns">
            <button class="btn btn-danger" onclick="deleteNote()">DELETE</button>
            <button class="btn" onclick="closeModal()">CANCEL</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var notes=[],currentId=null,sidebarVisible=true,soundEnabled=true,searchQuery='',audioCtx=null;
try{notes=JSON.parse(localStorage.getItem('crt_notes')||'[]');}catch(e){notes=[];}
notes=notes.map(function(n){return Object.assign({},n,{created:n.created||Date.now(),modified:n.modified||Date.now()});});
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
var CP=[{f:820,d:.042},{f:780,d:.038},{f:860,d:.045},{f:750,d:.040},{f:900,d:.036}];
function playClack(sp,en){if(!soundEnabled)return;try{var ctx=getAC(),now=ctx.currentTime;if(en){pi(ctx,now,320,.09,.6);pn(ctx,now,.06,.08);return;}if(sp){pi(ctx,now,580,.055,.45);pn(ctx,now,.04,.06);return;}var p=CP[Math.floor(Math.random()*CP.length)];pi(ctx,now,p.f+(Math.random()*40-20),p.d,.32+Math.random()*.12);pn(ctx,now,.025,p.d*.8);}catch(e){}}
function pi(ctx,now,freq,dur,gain){var o=ctx.createOscillator(),e=ctx.createGain();o.connect(e);e.connect(ctx.destination);o.type='square';o.frequency.setValueAtTime(freq,now);o.frequency.exponentialRampToValueAtTime(freq*.25,now+dur);e.gain.setValueAtTime(gain,now);e.gain.exponentialRampToValueAtTime(.0001,now+dur);o.start(now);o.stop(now+dur);}
function pn(ctx,now,gain,dur){var bl=Math.ceil(ctx.sampleRate*dur),buf=ctx.createBuffer(1,bl,ctx.sampleRate),data=buf.getChannelData(0);for(var i=0;i<bl;i++)data[i]=Math.random()*2-1;var src=ctx.createBufferSource(),flt=ctx.createBiquadFilter(),env=ctx.createGain();src.buffer=buf;flt.type='bandpass';flt.frequency.value=2000;flt.Q.value=.8;src.connect(flt);flt.connect(env);env.connect(ctx.destination);env.gain.setValueAtTime(gain,now);env.gain.exponentialRampToValueAtTime(.0001,now+dur);src.start(now);src.stop(now+dur);}
function toggleSound(){soundEnabled=!soundEnabled;var btn=document.getElementById('btnSound');btn.textContent=soundEnabled?'SFX':'SFX-';btn.className='btn '+(soundEnabled?'sound-on':'sound-off');setStatus(soundEnabled?'SOUND ON':'SOUND OFF');}
function init(){updateDate();renderNoteList();if(notes.length>0)openNote(notes[0].id);setInterval(updateDate,30000);}
function updateDate(){var d=new Date(),p=function(n){return String(n).padStart(2,'0');};document.getElementById('dateDisplay').textContent=p(d.getMonth()+1)+'/'+p(d.getDate())+'/'+d.getFullYear();}
function fmt(ts){if(!ts)return'--';var d=new Date(ts),p=function(n){return String(n).padStart(2,'0');};return p(d.getMonth()+1)+'/'+p(d.getDate())+'/'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());}
function updateTS(note){if(!note){document.getElementById('timestampBar').classList.remove('visible');return;}document.getElementById('timestampBar').classList.add('visible');document.getElementById('tsCreated').textContent=fmt(note.created);document.getElementById('tsModified').textContent=fmt(note.modified);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function newNote(type){var now=Date.now();var note={id:uid(),type:type,title:'',content:type==='task'?[]:'',created:now,modified:now};notes.unshift(note);persist();clearSearch();renderNoteList();openNote(note.id);setTimeout(function(){document.getElementById('noteTitle').focus();},150);}
function openNote(id){currentId=id;var note=notes.find(function(n){return n.id===id;});if(!note)return;document.getElementById('noteTitle').value=note.title;document.getElementById('modeLabel').textContent=note.type==='task'?'TASKS':'NOTE';updateTS(note);renderEditor(note);renderNoteList();setStatus('EDITING');}
function touchMod(){var note=notes.find(function(n){return n.id===currentId;});if(note){note.modified=Date.now();document.getElementById('tsModified').textContent=fmt(note.modified);}}
function saveTitle(){var note=notes.find(function(n){return n.id===currentId;});if(!note)return;note.title=document.getElementById('noteTitle').value;touchMod();persist();renderNoteList();}
function saveText(){var note=notes.find(function(n){return n.id===currentId;});if(!note||note.type!=='text')return;var ta=document.getElementById('textArea');if(ta){note.content=ta.value;touchMod();persist();}}
function persist(){try{localStorage.setItem('crt_notes',JSON.stringify(notes));}catch(e){}document.getElementById('noteCount').textContent=notes.length;}
function renderEditor(note){var area=document.getElementById('editorArea');if(note.type==='text'){area.innerHTML='';var ta=document.createElement('textarea');ta.className='text-editor';ta.id='textArea';ta.placeholder='START TYPING YOUR NOTE...';ta.value=note.content||'';ta.addEventListener('input',saveText);ta.addEventListener('keydown',handleKS);area.appendChild(ta);}else{renderTE(note,area);}}
function handleKS(e){if(e.key==='Enter'){playClack(false,true);return;}if(e.key===' '){playClack(true,false);return;}if(e.key.length===1){playClack(false,false);}}
function renderTE(note,area){if(!Array.isArray(note.content))note.content=[];area.innerHTML='';var ul=document.createElement('ul');ul.className='task-list';ul.id='taskList';note.content.forEach(function(task,i){ul.appendChild(makeTR(task,i));});area.appendChild(ul);var ab=document.createElement('button');ab.className='add-task-btn';ab.textContent='[ + ] ADD TASK';ab.onclick=addTask;area.appendChild(ab);}
function makeTR(task,idx){var li=document.createElement('li');li.className='task-input-row';var cb=document.createElement('input');cb.type='checkbox';cb.className='task-cb';cb.checked=task.done;cb.onchange=function(){toggleTask(idx,cb.checked);};var inp=document.createElement('input');inp.type='text';inp.className='task-text'+(task.done?' done':'');inp.value=task.text;inp.placeholder='TASK DESCRIPTION...';inp.oninput=function(){updateTask(idx,inp.value);};inp.onkeydown=function(e){handleKS(e);if(e.key==='Enter'){e.preventDefault();addTask();}if(e.key==='Backspace'&&inp.value===''){e.preventDefault();removeTask(idx);}};var del=document.createElement('button');del.className='task-del';del.textContent='[x]';del.onclick=function(){removeTask(idx);};li.appendChild(cb);li.appendChild(inp);li.appendChild(del);return li;}
function addTask(){var note=notes.find(function(n){return n.id===currentId;});if(!note)return;note.content.push({text:'',done:false});touchMod();persist();renderTE(note,document.getElementById('editorArea'));var inputs=document.querySelectorAll('.task-text');if(inputs.length)inputs[inputs.length-1].focus();}
function toggleTask(idx,done){var note=notes.find(function(n){return n.id===currentId;});if(!note)return;note.content[idx].done=done;var inputs=document.querySelectorAll('.task-text');if(inputs[idx])inputs[idx].classList.toggle('done',done);touchMod();persist();var dc=note.content.filter(function(t){return t.done;}).length;setStatus(dc+'/'+note.content.length+' DONE');}
function updateTask(idx,text){var note=notes.find(function(n){return n.id===currentId;});if(!note)return;note.content[idx].text=text;touchMod();persist();}
function removeTask(idx){var note=notes.find(function(n){return n.id===currentId;});if(!note)return;note.content.splice(idx,1);touchMod();persist();renderTE(note,document.getElementById('editorArea'));}
function handleSearch(q){searchQuery=q.trim().toLowerCase();document.getElementById('searchClear').classList.toggle('visible',q.length>0);renderNoteList();var ss=document.getElementById('searchStatus');if(searchQuery){var m=getFN().length;ss.style.display='inline';ss.textContent='FOUND: '+m;}else{ss.style.display='none';}}
function clearSearch(){document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.remove('visible');document.getElementById('searchStatus').style.display='none';searchQuery='';renderNoteList();}
function getFN(){if(!searchQuery)return notes;return notes.filter(function(n){var tm=n.title.toLowerCase().includes(searchQuery);var cm=n.type==='text'?(n.content||'').toLowerCase().includes(searchQuery):(n.content||[]).some(function(t){return t.text.toLowerCase().includes(searchQuery);});return tm||cm;});}
function hl(str,q){if(!q)return eh(str);var idx=str.toLowerCase().indexOf(q);if(idx===-1)return eh(str);return eh(str.slice(0,idx))+'<mark>'+eh(str.slice(idx,idx+q.length))+'</mark>'+eh(str.slice(idx+q.length));}
function getPrev(note){if(note.type==='text')return(note.content||'').replace(/\n/g,' ').slice(0,38)||'--';var t=note.content||[];return t.filter(function(x){return x.done;}).length+'/'+t.length+' DONE';}
function renderNoteList(){var list=document.getElementById('noteList');list.innerHTML='';document.getElementById('noteCount').textContent=notes.length;var filtered=getFN();if(!notes.length){list.innerHTML='<div class="no-results">-- EMPTY --</div>';return;}if(!filtered.length){list.innerHTML='<div class="no-results">NO RESULTS</div>';return;}filtered.forEach(function(note){var div=document.createElement('div');div.className='note-item'+(note.id===currentId?' active':'');var icon=note.type==='task'?'[T]':'[N]';var title=note.title||'(UNTITLED)';div.innerHTML='<div class="note-item-title"><span class="note-icon">'+icon+'</span><span>'+hl(title,searchQuery)+'</span></div><div class="note-item-date">'+fmt(note.modified)+'</div><div class="note-item-preview">'+hl(getPrev(note),searchQuery)+'</div>';div.onclick=function(){openNote(note.id);};list.appendChild(div);});}
function toggleSidebar(){sidebarVisible=!sidebarVisible;document.getElementById('sidebar').classList.toggle('collapsed',!sidebarVisible);document.getElementById('btnView').classList.toggle('active',sidebarVisible);}
function confirmDelete(){if(!currentId){setStatus('NO NOTE SELECTED');return;}document.getElementById('deleteModal').classList.add('show');}
function closeModal(){document.getElementById('deleteModal').classList.remove('show');}
function deleteNote(){notes=notes.filter(function(n){return n.id!==currentId;});currentId=null;persist();renderNoteList();document.getElementById('noteTitle').value='';document.getElementById('modeLabel').textContent='--';document.getElementById('timestampBar').classList.remove('visible');document.getElementById('editorArea').innerHTML='<div class="empty-state"><div class="big">|</div><p class="glow-text">NO NOTE SELECTED</p><p>TAP + NOTE OR + TASKS TO BEGIN<span class="cursor">_</span></p></div>';if(notes.length>0)openNote(notes[0].id);closeModal();setStatus('NOTE DELETED');}
function setStatus(msg){var el=document.getElementById('statusLeft');el.innerHTML=msg+'<span class="cursor">_</span>';clearTimeout(window._st);window._st=setTimeout(function(){el.innerHTML='READY<span class="cursor">_</span>';},3500);}
function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();newNote('text');}if((e.ctrlKey||e.metaKey)&&e.key==='t'){e.preventDefault();newNote('task');}if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('searchInput').focus();}if(e.key==='Escape'){closeModal();if(searchQuery)clearSearch();}});
init();
</script>
</body>
</html>
